<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ecommerce Dashboard</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f5f7fb;
    }

    .sidebar {
      height: 100vh;
      background-color: #212529;
      color: white;
      padding: 20px;
    }

    .sidebar a {
      color: #adb5bd;
      text-decoration: none;
      display: block;
      margin: 10px 0;
    }

    .sidebar a:hover {
      color: white;
    }

    .card {
      border: none;
      border-radius: 12px;
    }

    .card h5 {
      font-size: 14px;
      color: #6c757d;
    }

    .card h3 {
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
    <div class="col-md-2 sidebar">
      <h4>E-Shop</h4>
      <a href="#">Dashboard</a>
      <a href="#">Orders</a>
      <a href="#">Products</a>
      <a href="#">Customers</a>
      <a href="#">Reports</a>
      <a href="#">Settings</a>
    </div>

    <!-- Main Content -->
    <div class="col-md-10 p-4">

      <h2 class="mb-4">Dashboard</h2>

      <!-- Stats Cards -->
      <div class="row g-4">

        <div class="col-md-3">
          <div class="card p-3 shadow-sm">
            <h5>Total Sales</h5>
            <h3>₹45,000</h3>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card p-3 shadow-sm">
            <h5>Orders</h5>
            <h3>120</h3>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card p-3 shadow-sm">
            <h5>Products</h5>
            <h3>80</h3>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card p-3 shadow-sm">
            <h5>Customers</h5>
            <h3>60</h3>
          </div>
        </div>

      </div>

      <!-- Table Example -->
      <div class="mt-5">
        <h4>Recent Orders</h4>
        <table class="table table-striped mt-3">
          <thead>
            <tr>
              <th>#</th>
              <th>Customer</th>
              <th>Product</th>
              <th>Status</th>
              <th>Amount</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>1</td>
              <td>John Doe</td>
              <td>Phone</td>
              <td><span class="badge bg-success">Delivered</span></td>
              <td>₹10,000</td>
            </tr>
            <tr>
              <td>2</td>
              <td>Jane Smith</td>
              <td>Laptop</td>
              <td><span class="badge bg-warning">Pending</span></td>
              <td>₹25,000</td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>

  </div>
</div>

</body>
</html>
